<?xml version="1.0" encoding="UTF-8"?>
<!--
  Notification iOS - Inkmap
  Format : 1080 x 280 px (optimisé pour Reel 1080x1920, centré horizontalement)
  Calques séparables : bg / icon / title / time / subtitle / body

  Pour After Effects :
  1. Importer en tant que "Footage" (pas "Composition") pour garder le SVG vectoriel
  2. Ou : Layer > Create > Create Shapes from Vector Layer (pour éditer chaque path)
  3. Animation d'entrée recommandée : Position Y (-120 → 0) + Opacity (0 → 100) sur 0.35s, easing cubic-bezier(.2,.8,.2,1)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 280" width="1080" height="280">

  <!-- Filtre ombre douce (iOS notification shadow) -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============ BANNER BG ============ -->
  <!-- Fond glassmorphism iOS dark — si tu composites sur un lock screen, ajoute un Gaussian Blur 40-60px sur le calque derrière -->
  <g id="bg" filter="url(#shadow)">
    <rect x="60" y="50" width="960" height="180" rx="42" ry="42"
          fill="#1c1c1e" fill-opacity="0.86"/>
    <!-- Bordure subtile (iOS material edge) -->
    <rect x="60" y="50" width="960" height="180" rx="42" ry="42"
          fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  </g>

  <!-- ============ ICON INKMAP (favicon.svg) ============ -->
  <!-- Source : /favicon.svg (viewBox 512×512) remis à l'échelle 120×120 et positionné à (90,80) -->
  <g id="icon" transform="translate(90, 80) scale(0.234375)">
    <rect width="512" height="512" rx="64" fill="#0d0d0d"/>
    <text x="256" y="230" font-family="Arial Black, Impact, sans-serif" font-size="160" font-weight="900" letter-spacing="-8" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">INK</text>
    <text x="256" y="370" font-family="Arial Black, Impact, sans-serif" font-size="160" font-weight="900" letter-spacing="-8" fill="#c0392b" text-anchor="middle" dominant-baseline="middle">MAP</text>
  </g>

  <!-- ============ TITLE "Inkmap" ============ -->
  <text id="title" x="240" y="112"
        font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="32" font-weight="600" fill="#ffffff" letter-spacing="-0.2">
    Inkmap
  </text>

  <!-- ============ TIMESTAMP "maintenant" ============ -->
  <text id="time" x="980" y="112"
        font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="400" fill="#8e8e93" text-anchor="end">
    maintenant
  </text>

  <!-- ============ SUBTITLE BOLD ============ -->
  <text id="subtitle" x="240" y="156"
        font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="32" font-weight="600" fill="#ffffff" letter-spacing="-0.2">
    Nouvelle demande
  </text>

  <!-- ============ BODY ============ -->
  <text id="body" x="240" y="200"
        font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif"
        font-size="30" font-weight="400" fill="#d1d1d6" letter-spacing="-0.1">
    fineline · avant-bras · 200–300 €
  </text>

</svg>
