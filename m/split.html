<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Inkmap — Split DM vs Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    background: #000;
  }

  /* ============ LAYOUT SPLIT VERTICAL ============ */
  .split {
    display: grid;
    grid-template-rows: 1fr 1fr; /* split horizontal : DM en haut, brief en bas (mieux en 9:16) */
    width: 100vw; height: 100vh;
  }
  /* Sur écran paysage on revient au split vertical (gauche/droite) */
  @media (min-aspect-ratio: 1/1) {
    .split { grid-template-rows: 1fr; grid-template-columns: 1fr 1fr; }
  }

  /* ============ CÔTÉ GAUCHE (HAUT EN PORTRAIT) — DM CHAOS ============ */
  .left {
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  /* Bulles fantômes en arrière-plan (effet "50 messages noyés") */
  .ghost-bubble {
    position: absolute;
    background: rgba(120, 120, 120, 0.18);
    border-radius: 18px;
    height: 14px;
    filter: blur(1.5px);
  }
  .ghost-bubble:nth-child(1) { top: 8%;  left: 8%;  width: 55%; opacity: 0.55; }
  .ghost-bubble:nth-child(2) { top: 14%; right: 6%; width: 40%; opacity: 0.45; height: 18px; }
  .ghost-bubble:nth-child(3) { top: 22%; left: 10%; width: 48%; opacity: 0.4; }
  .ghost-bubble:nth-child(4) { top: 30%; right: 8%; width: 35%; opacity: 0.35; height: 20px; }
  .ghost-bubble:nth-child(5) { top: 38%; left: 6%;  width: 50%; opacity: 0.3; }
  .ghost-bubble:nth-child(6) { bottom: 22%; right: 10%; width: 42%; opacity: 0.32; height: 16px; }
  .ghost-bubble:nth-child(7) { bottom: 14%; left: 8%; width: 38%; opacity: 0.28; }
  .ghost-bubble:nth-child(8) { bottom: 6%;  right: 6%; width: 45%; opacity: 0.4; height: 22px; }

  /* La bulle DM principale */
  .dm-bubble {
    position: relative;
    background: #2a2a2a;
    color: rgba(255, 255, 255, 0.62);
    padding: 22px 28px;
    border-radius: 26px 26px 26px 6px;
    font-size: clamp(22px, 4.4vw, 38px);
    font-weight: 500;
    line-height: 1.25;
    max-width: 84%;
    filter: blur(0.6px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  }
  .dm-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 18px;
    width: 12px; height: 12px;
    background: #2a2a2a;
    border-radius: 0 0 12px 0;
  }
  .dm-meta {
    position: absolute;
    bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ============ SÉPARATEUR ============ */
  .divider {
    position: absolute;
    z-index: 5;
    background: linear-gradient(90deg, transparent, rgba(192, 57, 43, 0.4), transparent);
  }
  /* en portrait : ligne horizontale */
  .split:not(.landscape) .divider {
    left: 0; right: 0;
    top: 50%; height: 1px;
    transform: translateY(-50%);
  }
  /* en paysage (overridé via @media plus haut) — pas critique ici */

  /* ============ CÔTÉ DROITE (BAS EN PORTRAIT) — BRIEF NET ============ */
  .right {
    background: #fafaf7;
    color: #0d0d0d;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: clamp(20px, 5vw, 40px);
    overflow: hidden;
  }
  /* Texture papier ultra subtile */
  .right::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(192, 57, 43, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.03) 0%, transparent 40%);
    pointer-events: none;
  }

  .brief-card {
    width: 100%;
    max-width: 460px;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-left: 4px solid #c0392b;
    padding: clamp(18px, 4vw, 28px) clamp(22px, 5vw, 32px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    position: relative;
    z-index: 2;
  }
  .brief-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .brief-logo {
    width: 28px; height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .brief-tag {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c0392b;
  }
  .brief-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 3.8vw, 26px);
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .brief-rows {
    display: flex; flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .brief-row {
    display: flex; align-items: center; gap: 12px;
    font-size: clamp(13px, 2.6vw, 15px);
  }
  .brief-row-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #999;
    min-width: 70px;
  }
  .brief-row-val {
    color: #0d0d0d;
    font-weight: 500;
  }
  .brief-row-val.accent {
    color: #c0392b; font-weight: 700;
  }
  .brief-desc {
    background: #fafaf7;
    padding: 14px 16px;
    border-radius: 4px;
    font-size: clamp(13px, 2.6vw, 14.5px);
    line-height: 1.5;
    color: #444;
    font-style: italic;
    border-left: 2px solid #ddd;
  }
  .brief-cta {
    display: inline-block;
    margin-top: 16px;
    background: #c0392b;
    color: #fff;
    padding: 11px 22px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
  }

  /* Étiquette en haut de chaque côté pour le contexte du Reel */
  .label {
    position: absolute;
    z-index: 3;
    top: 16px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 12px;
  }
  .label-left {
    left: 16px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .label-right {
    right: 16px;
    background: #0d0d0d;
    color: #fff;
  }
  /* Bouton de toggle invisible — pour cacher les labels au tournage */
  .ui-toggle {
    position: absolute;
    bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.5); color: white;
    backdrop-filter: blur(20px);
    border: none; padding: 8px 14px;
    border-radius: 16px;
    font-size: 11px; font-weight: 500;
    cursor: pointer;
    z-index: 100;
    font-family: inherit;
  }
  body.no-ui .label, body.no-ui .ui-toggle { display: none; }
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <span class="label label-left">avant inkmap</span>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="ghost-bubble"></div>
    <div class="dm-bubble">ça coûte combien ?</div>
    <div class="dm-meta">+ 50 DMs comme ça par semaine</div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <span class="label label-right">avec inkmap</span>
    <div class="brief-card">
      <div class="brief-header">
        <img class="brief-logo" src="inkmap-icon.png" alt="">
        <span class="brief-tag">Brief client</span>
      </div>
      <div class="brief-title">Deux hirondelles qui s'envolent</div>
      <div class="brief-rows">
        <div class="brief-row">
          <span class="brief-row-label">Style</span>
          <span class="brief-row-val">Blackwork</span>
        </div>
        <div class="brief-row">
          <span class="brief-row-label">Ville</span>
          <span class="brief-row-val">Paris</span>
        </div>
        <div class="brief-row">
          <span class="brief-row-label">Zone</span>
          <span class="brief-row-val">Bras</span>
        </div>
        <div class="brief-row">
          <span class="brief-row-label">Budget</span>
          <span class="brief-row-val accent">150 €</span>
        </div>
      </div>
      <div class="brief-desc">"Deux petites hirondelles, l'une qui décolle, l'autre qui plane juste à côté. Trait fin mais bien marqué."</div>
      <span class="brief-cta">Voir le brief →</span>
    </div>
  </div>
</div>

<button class="ui-toggle" onclick="document.body.classList.toggle('no-ui')">cacher labels</button>

<script>
  // H ou Esc = toggle UI (pour le tournage)
  document.addEventListener('keydown', e => {
    if (e.key === 'h' || e.key === 'Escape') document.body.classList.toggle('no-ui');
  });
</script>
</body>
</html>
